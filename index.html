<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="keyword" content="redsnake,snake game,snake">
    <meta name="description" content="RedSnake is simple clean minimal old style Snake game.">
    <link rel="icon" href="favicon.png" type="image/x-icon">
    <link rel="apple-touch-icon" href="favicon.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <title>RedSnake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="homescreen">
        <h1>RedSnake</h1>
        <button id="playbtn">Play</button>
    </div>
    <div id="gamecontainer">
        <div id="score">Score: <span id="scoree">0</span></div>
        <canvas id="gamescreen"></canvas>
        
        <div id="gameoverpopup" class="hidden">
            <div class="popup-box">
                <p>Score: <span id="finalscore">0</span></p>
                <button id="restartbtn">Restart</button>
                <button id="homebtn">Home</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
