<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Clean and minimal Snake game">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google-site-verification" content="Xcy_X2z73e1Khm-4lgwmyLaYKD_7-I_Qe9j8XIIlpR0" />
    <title>RedSnake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="homescreen">
        <h1>RedSnake</h1>
        <button id="playbtn">Play</button>
    </div>
    <div id="gamecontainer">
        <div id="score">Score: <span id="scoree">0</span></div>
        <canvas id="gamescreen"></canvas>
        <div id="restart">Restart</div>
        <div id="gameoverpopup" class="hidden">
        <div class="popup-box">
            <p>Score: <span id="finalscore">0</span></p>
            <button id="restartbtn">Restart</button>
            <button id="homebtn">Home</button>
        </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
